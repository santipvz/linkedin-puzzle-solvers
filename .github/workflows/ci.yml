name: CI

on:
  push:
  pull_request:

jobs:
  solver-and-extension-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/solver_api/requirements.txt

      - name: Compile Python modules
        run: |
          python -m compileall services/solver_api/app
          python -m compileall games/queen_solver/src
          python -m compileall games/tango_solver/src
          python -m compileall games/sudoku_solver/src
          python -m compileall games/zip_solver/src
          python -m compileall games/patches_solver/src

      - name: Run solver smoke checks
        run: python scripts/smoke_check.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check extension JavaScript syntax
        run: |
          node --check extension/background.js
          node --check extension/content.js
          node --check extension/popup.js
