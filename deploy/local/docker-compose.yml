services:
  solver-api:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile
    container_name: linkedin-puzzle-solver-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SOLVER_API_BIND_PORT:-18000}:8000"
    environment:
      - DATASET_CAPTURE_ENABLED=${DATASET_CAPTURE_ENABLED:-1}
      - DATASET_CAPTURE_DIR=${DATASET_CAPTURE_CONTAINER_DIR:-/app/datasets}
    volumes:
      - ${DATASET_CAPTURE_HOST_DIR:-../../datasets}:${DATASET_CAPTURE_CONTAINER_DIR:-/app/datasets}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
